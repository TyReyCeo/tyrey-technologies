# Continuous integration — runs on every PR and every push to main.
# Backend: install deps, apply migrations to a scratch DB, lint, run the test suite.
# Frontend: type-check and production build.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations to a scratch database
        run: |
          DATABASE_URL=sqlite:///./ci-migrate.db alembic upgrade head
          DATABASE_URL=sqlite:///./ci-migrate.db alembic check

      - name: Lint
        run: ruff check .

      - name: Run test suite (demo mode, no keys required)
        run: pytest -q

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://tyrey-backend.onrender.com
